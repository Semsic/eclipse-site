<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eclipse</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #2a2a2a;  /* cinza sólido */
            overflow: hidden;
            font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
        }

        .title {
            position: relative;
            z-index: 10;
            font-size: clamp(4rem, 15vw, 10rem);
            font-weight: 900;
            letter-spacing: 0.15em;
            color: #e0e0e0;
            text-shadow:
                0 0 20px rgba(255, 255, 255, 0.3),
                0 0 60px rgba(180, 180, 255, 0.3),
                0 0 100px rgba(140, 140, 255, 0.2);
            animation: pulse 3s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                text-shadow:
                    0 0 20px rgba(255, 255, 255, 0.3),
                    0 0 60px rgba(180, 180, 255, 0.3),
                    0 0 100px rgba(140, 140, 255, 0.2);
            }
            50% {
                text-shadow:
                    0 0 35px rgba(255, 255, 255, 0.6),
                    0 0 90px rgba(200, 200, 255, 0.6),
                    0 0 140px rgba(160, 160, 255, 0.4);
            }
        }
    </style>
</head>
<body>
    <canvas id="particles"></canvas>
    <h1 class="title">Eclipse</h1>

    <script>
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');

        let width, height;
        const particles = [];
        const PARTICLE_COUNT = 120;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // Criar partículas
        for (let i = 0; i < PARTICLE_COUNT; i++) {
            particles.push({
                x: Math.random() * width,
                y: Math.random() * height,
                vx: (Math.random() - 0.5) * 0.6,
                vy: (Math.random() - 0.5) * 0.6,
                radius: Math.random() * 2.5 + 0.8,
                opacity: Math.random() * 0.4 + 0.2
            });
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);

            for (const p of particles) {
                // Movimento lento com leve tendência para baixo
                p.x += p.vx;
                p.y += p.vy + 0.08;   // leve gravidade
                p.vy *= 0.999;        // atrito

                // Reposicionar se sair da tela
                if (p.x < -10) p.x = width + 10;
                if (p.x > width + 10) p.x = -10;
                if (p.y < -10) p.y = height + 10;
                if (p.y > height + 10) p.y = -10;

                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(220, 220, 240, ${p.opacity})`;
                ctx.fill();
            }

            // Linhas entre partículas próximas
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const a = particles[i];
                    const b = particles[j];
                    const dx = a.x - b.x;
                    const dy = a.y - b.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 100) {
                        ctx.beginPath();
                        ctx.moveTo(a.x, a.y);
                        ctx.lineTo(b.x, b.y);
                        ctx.strokeStyle = `rgba(200, 200, 220, ${0.12 * (1 - dist / 100)})`;
                        ctx.lineWidth = 0.5;
                        ctx.stroke();
                    }
                }
            }

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
